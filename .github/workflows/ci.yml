name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          if [ -d /Applications/Xcode_15.4.app ]; then
            sudo xcode-select -s /Applications/Xcode_15.4.app
          else
            echo "Xcode 15.4 not present; using preinstalled default" >&2
          fi

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Build App Store wrapper
        run: |
          xcodebuild \
            -project App/PhoneRelay.xcodeproj \
            -scheme PhoneRelayApp \
            -configuration Release \
            -derivedDataPath .build/XcodeDerivedData \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY=- \
            DEVELOPMENT_TEAM= \
            build

      - name: Verify App Store wrapper entitlements
        run: |
          APP=".build/XcodeDerivedData/Build/Products/Release/PhoneRelay.app"
          codesign -d --entitlements :- "$APP" > entitlements.plist 2>/dev/null
          /usr/libexec/PlistBuddy -c "Print :com.apple.security.app-sandbox" entitlements.plist | grep -qx true
          /usr/libexec/PlistBuddy -c "Print :com.apple.security.files.downloads.read-write" entitlements.plist | grep -qx true
          codesign -d --entitlements :- "$APP/Contents/Resources/bin/adb" > adb-entitlements.plist 2>/dev/null
          /usr/libexec/PlistBuddy -c "Print :com.apple.security.app-sandbox" adb-entitlements.plist | grep -qx true
          /usr/libexec/PlistBuddy -c "Print :com.apple.security.inherit" adb-entitlements.plist | grep -qx true

      # Catches packaging regressions (missing scrcpy-server, renamed resource
      # bundle, broken codesign invocations) that swift test can't see.
      - name: Package app (release dry run)
        run: scripts/package_app.sh
