name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          if [ -d /Applications/Xcode_15.4.app ]; then
            sudo xcode-select -s /Applications/Xcode_15.4.app
          else
            echo "Xcode 15.4 not present; using preinstalled default" >&2
          fi

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Build App Store wrapper
        run: |
          xcodebuild \
            -project App/PhoneRelay.xcodeproj \
            -scheme PhoneRelayApp \
            -configuration Release \
            -derivedDataPath .build/XcodeDerivedData \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY=- \
            DEVELOPMENT_TEAM= \
            build

      - name: Verify Xcode release artifact
        run: |
          APP=".build/XcodeDerivedData/Build/Products/Release/PhoneRelay.app"
          scripts/verify_release_artifact.sh "$APP"

      # Catches packaging regressions (missing scrcpy-server, renamed resource
      # bundle, broken codesign invocations) that swift test can't see.
      - name: Package app (release dry run)
        run: scripts/package_app.sh
