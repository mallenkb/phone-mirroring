name: Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  release:
    types: [published, edited, released]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Write latest release metadata
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if gh api "repos/$REPO/releases/latest" \
            --jq '{
              tag_name: .tag_name,
              name: .name,
              html_url: .html_url,
              published_at: .published_at,
              assets: [.assets[] | {
                name: .name,
                size: .size,
                browser_download_url: .browser_download_url
              }]
            }' > docs/release.json; then
            echo "Wrote release metadata from GitHub Releases."
          else
            echo "No latest release found; keeping committed docs/release.json fallback." >&2
          fi
          cat docs/release.json

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
